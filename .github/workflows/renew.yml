name: Emby Auto Renew

on:
  repository_dispatch:
    types: [emby_renew]
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install requests; fi

      - name: Run Emby Keep-Alive
        env:
          # Payload from Cloudflare Worker repository_dispatch
          EMBY_ACCOUNTS_JSON: ${{ toJson(github.event.client_payload.accounts) != 'null' && toJson(github.event.client_payload.accounts) || secrets.EMBY_ACCOUNTS_JSON }}
          # Fallback secrets for single account
          EMBY_URL: ${{ secrets.EMBY_URL }}
          EMBY_USERNAME: ${{ secrets.EMBY_USERNAME }}
          EMBY_PASSWORD: ${{ secrets.EMBY_PASSWORD }}
          EMBY_DEVICE_NAME: "Lisa's iPhone"
        run: |
          python main.py
