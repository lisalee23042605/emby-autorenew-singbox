name: Emby Auto Renew

on:
  repository_dispatch:
    types: [emby_renew]
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install requests; fi

      - name: Setup sing-box Proxy
        if: ${{ github.event.client_payload.proxy_node != '' }}
        continue-on-error: true
        env:
          NODE_LINK: ${{ github.event.client_payload.proxy_node }}
        run: |
          bash <(wget -qO- https://main.ssss.nyc.mn/setup_proxy.sh)

      - name: Run Emby Keep-Alive
        env:
          EMBY_ACCOUNTS_JSON: ${{ toJson(github.event.client_payload.accounts) }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python main.py
